version: "3.9"

services:
  flutter-builder:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./build:/app/build
    environment:
      FLUTTER_STORAGE_BASE_URL: "${FLUTTER_STORAGE_BASE_URL:-https://storage.googleapis.com}"
      PUB_HOSTED_URL: "${PUB_HOSTED_URL:-https://pub.dev}"
