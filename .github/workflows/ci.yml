name: Continuous Integration

on:
  workflow_dispatch:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  flutter: 
    name: Flutter (Analyze & Build)
    runs-on: - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version:
   cache: true
      - name: Install dependencies
        run: flutter pub get
      - name: Analyze
        run: flutter analyze
      - name: Build Web
        run: flutter build web --release

  security_scan: 
    name: Security Scan (Trivy)
    needs: flutter
    runs-on: - uses: actions/checkout@v4
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'